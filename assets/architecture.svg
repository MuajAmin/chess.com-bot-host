<svg viewBox="0 0 860 380" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 2;
      rx: 12px;
    }
    .card-active {
      fill: #0d1117;
      stroke: #58a6ff;
      stroke-width: 2;
      rx: 12px;
      filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.15));
    }
    .card-worker {
      fill: #0d1117;
      stroke: #ff7b72;
      stroke-width: 2;
      rx: 12px;
      filter: drop-shadow(0 0 8px rgba(255, 123, 114, 0.15));
    }
    .sub-box {
      fill: #161b22;
      stroke: #21262d;
      stroke-width: 1.5;
      rx: 6px;
    }
    .title-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      font-weight: 600;
      fill: #c9d1d9;
    }
    .sub-title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #58a6ff;
    }
    .sub-title-worker {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #ff7b72;
    }
    .desc-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10px;
      fill: #8b949e;
    }
    .arrow-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 10px;
      font-weight: bold;
      fill: #c9d1d9;
    }
    .flow-line {
      stroke: #30363d;
      stroke-width: 2;
      fill: none;
    }
    .active-line {
      stroke: #58a6ff;
      stroke-width: 2;
      stroke-dasharray: 6, 4;
      animation: flow 1.2s linear infinite;
      fill: none;
    }
    .engine-line {
      stroke: #ff7b72;
      stroke-width: 2;
      stroke-dasharray: 6, 4;
      animation: flow 1.2s linear infinite;
      fill: none;
    }
    
    /* Animations */
    @keyframes flow {
      to {
        stroke-dashoffset: -20;
      }
    }
    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1.0; }
    }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 2px rgba(88, 166, 255, 0.4)); }
      50% { filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.8)); }
    }
    @keyframes pointer-move {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(5px, -3px); }
      66% { transform: translate(-3px, 4px); }
    }
    
    .pulse-dot-1 { animation: pulse-opacity 1.5s ease-in-out infinite; }
    .pulse-dot-2 { animation: pulse-opacity 2s ease-in-out infinite 0.5s; }
    .pulse-dot-3 { animation: pulse-opacity 1.8s ease-in-out infinite 0.2s; }
    .radar-pulse { animation: pulse-glow 2.5s ease-in-out infinite; }
    .cursor-animate { animation: pointer-move 4s ease-in-out infinite; }
  </style>

  <!-- BACKGROUND GRID -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#21262d" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#0d1117"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- HOST PROCESS CARD -->
  <g transform="translate(30, 30)">
    <rect width="260" height="320" class="card-active" />
    <text x="20" y="30" class="title-text">Host Process (main.py)</text>
    <line x1="20" y1="42" x2="240" y2="42" stroke="#30363d" stroke-width="1"/>

    <!-- 1. Challenge Listener Sub-box -->
    <g transform="translate(15, 60)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title">Challenge Listener</text>
      <text x="12" y="40" class="desc-text">• Polls Chess.com incoming requests</text>
      <text x="12" y="55" class="desc-text">• Filters challengers using whitelist</text>
      
      <!-- Animated Radar Scan Indicator -->
      <g transform="translate(195, 35)">
        <circle r="15" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.2" class="radar-pulse"/>
        <circle r="8" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
        <line x1="0" y1="0" x2="10" y2="-10" stroke="#58a6ff" stroke-width="2" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
        </line>
        <circle cx="0" cy="0" r="2.5" fill="#58a6ff"/>
      </g>
    </g>

    <!-- 2. Browser Context Sub-box -->
    <g transform="translate(15, 145)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title">Persistent Browser (Playwright)</text>
      <text x="12" y="40" class="desc-text">• Controls single Chromium context</text>
      <text x="12" y="55" class="desc-text">• Handles session state &amp; cookies</text>
      
      <!-- Browser window mock graphic -->
      <g transform="translate(185, 20)">
        <rect x="0" y="0" width="30" height="24" rx="2" fill="none" stroke="#8b949e" stroke-width="1.5"/>
        <line x1="0" y1="6" x2="30" y2="6" stroke="#8b949e" stroke-width="1.5"/>
        <circle cx="4" cy="3" r="1" fill="#ff7b72"/>
        <circle cx="8" cy="3" r="1" fill="#f0883e"/>
        <circle cx="12" cy="3" r="1" fill="#3fb950"/>
        <!-- Pulsing lock representing secure/persistence -->
        <path d="M 13,12 L 17,12 L 17,17 L 13,17 Z M 14,12 L 14,10 A 1.5,1.5 0 0,1 16,10 L 16,12" fill="none" stroke="#3fb950" stroke-width="1" class="pulse-dot-1"/>
      </g>
    </g>

    <!-- 3. Webhook Notifier Sub-box -->
    <g transform="translate(15, 230)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title">Notifier Service</text>
      <text x="12" y="40" class="desc-text">• Publishes logs asynchronously</text>
      <text x="12" y="55" class="desc-text">• Dispatches Telegram &amp; Discord alerts</text>
      
      <!-- Notifier Envelope Icon -->
      <g transform="translate(190, 25)">
        <rect x="0" y="0" width="22" height="15" rx="1" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
        <path d="M 0,0 L 11,8 L 22,0" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
        <circle cx="2" cy="13" r="1.5" fill="#58a6ff" class="pulse-dot-3"/>
      </g>
    </g>
  </g>

  <!-- WORKER SUBPROCESS CARD -->
  <g transform="translate(570, 30)">
    <rect width="260" height="320" class="card-worker" />
    <text x="20" y="30" class="title-text" fill="#ff7b72">Worker Subprocess (game_worker.py)</text>
    <line x1="20" y1="42" x2="240" y2="42" stroke="#30363d" stroke-width="1"/>

    <!-- 1. Neural Net Engine Sub-box -->
    <g transform="translate(15, 60)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title-worker">Lc0 Neural Net Engine</text>
      <text x="12" y="40" class="desc-text">• Loads chess weights file</text>
      <text x="12" y="55" class="desc-text">• Maia policy optimization (nodes=1)</text>
      
      <!-- Network Nodes Animation -->
      <g transform="translate(180, 15)">
        <!-- Connecting lines -->
        <line x1="10" y1="20" x2="25" y2="10" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
        <line x1="10" y1="20" x2="25" y2="30" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
        <line x1="25" y1="10" x2="40" y2="20" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
        <line x1="25" y1="30" x2="40" y2="20" stroke="#8b949e" stroke-width="1" opacity="0.4"/>
        <!-- Nodes -->
        <circle cx="10" cy="20" r="4" fill="#ff7b72" class="pulse-dot-1"/>
        <circle cx="25" cy="10" r="4" fill="#ff7b72" class="pulse-dot-2"/>
        <circle cx="25" cy="30" r="4" fill="#ff7b72" class="pulse-dot-3"/>
        <circle cx="40" cy="20" r="5" fill="#58a6ff" class="pulse-dot-1"/>
      </g>
    </g>

    <!-- 2. Humanizer Calibration Sub-box -->
    <g transform="translate(15, 145)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title-worker">Humanizer Engine</text>
      <text x="12" y="40" class="desc-text">• Adapts to active clock times</text>
      <text x="12" y="55" class="desc-text">• Configures game blunder ratios</text>
      
      <!-- Ticking Clock Icon -->
      <g transform="translate(195, 32)">
        <circle r="12" fill="none" stroke="#ff7b72" stroke-width="1.5"/>
        <line x1="0" y1="0" x2="0" y2="-7" stroke="#ff7b72" stroke-width="2" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="6" y2="0" stroke="#ff7b72" stroke-width="1.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
        </line>
      </g>
    </g>

    <!-- 3. Move Maker Sub-box -->
    <g transform="translate(15, 230)">
      <rect width="230" height="70" class="sub-box" />
      <text x="12" y="20" class="sub-title-worker">Bézier Move Maker</text>
      <text x="12" y="40" class="desc-text">• Generates smooth mouse curves</text>
      <text x="12" y="55" class="desc-text">• Triggers micro-click animations</text>
      
      <!-- Cursor Moving Animation -->
      <g transform="translate(190, 25)" class="cursor-animate">
        <path d="M 0,0 L 4,14 L 8,11 L 13,16 L 15,14 L 10,9 L 14,8 Z" fill="#c9d1d9" stroke="#161b22" stroke-width="1"/>
      </g>
    </g>
  </g>

  <!-- MIDDLE CONNECTORS -->
  
  <!-- Step 1: Spawn Subprocess -->
  <path d="M 290,120 L 570,120" class="flow-line" stroke-linecap="round"/>
  <polygon points="565,116 573,120 565,124" fill="#30363d" />
  <text x="375" y="110" class="arrow-text">1. Spawns Subprocess</text>

  <!-- Step 2: CDP Communication Channel -->
  <path d="M 570,190 L 290,190" class="active-line" stroke-linecap="round"/>
  <polygon points="295,186 287,190 295,194" fill="#58a6ff" />
  <text x="345" y="180" class="arrow-text" fill="#58a6ff">2. CDP WebSocket Protocol</text>

  <!-- Step 3: Resource Cleanup -->
  <path d="M 570,260 L 290,260" class="engine-line" stroke-linecap="round"/>
  <polygon points="295,256 287,260 295,264" fill="#ff7b72" />
  <text x="325" y="250" class="arrow-text" fill="#ff7b72">3. Subprocess Terminated (RAM Freed)</text>
</svg>
